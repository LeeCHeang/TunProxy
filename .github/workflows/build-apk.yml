name: Build APK

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Debug APK (Gradle)
        working-directory: android_app
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TunProxy-debug-apk
          path: |
            android_app/app/build/outputs/apk/debug/*.apk
            android_app/app/build/outputs/apk/*/debug/*.apk
